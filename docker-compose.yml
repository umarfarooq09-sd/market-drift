services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketdrift
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - marketdrift_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketdrift"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  marketdrift_postgres:
